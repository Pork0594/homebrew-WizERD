name: Tests

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Test Formula
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install local tap
        run: |
          TAP_DIR="$(brew --prefix)/Library/Taps/pork0594/homebrew-wizerd"
          mkdir -p "$TAP_DIR"
          cp -r "$(pwd)/." "$TAP_DIR/"
          rm -rf "$TAP_DIR/.git"

      - name: Install wizerd
        run: brew install wizerd

      - name: Audit formula
        run: brew audit --strict --online wizerd

      - name: Style check
        run: brew style wizerd

      - name: Test wizerd CLI
        run: wizerd --version
