name: Tests

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: Test Formula
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Homebrew
        if: runner.os == 'macOS'
        run: |
          if ! command -v brew &> /dev/null; then
            /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
          fi

      - name: Install Node via Homebrew
        run: brew install node

      - name: Create local tap
        run: |
          mkdir -p $(brew --prefix)/Library/Taps/homebrew/homebrew-wizerd
          cp -r $(pwd)/* $(brew --prefix)/Library/Taps/homebrew/homebrew-wizerd/
          rm -rf $(brew --prefix)/Library/Taps/homebrew/homebrew-wizerd/.git

      - name: Install wizerd
        run: brew install wizerd

      - name: Audit formula
        run: brew audit --strict --online wizerd

      - name: Style check
        run: brew style wizerd

      - name: Test wizerd CLI
        run: wizerd --version

      - name: Test wizerd generate
        run: |
          echo "CREATE TABLE users (id SERIAL PRIMARY KEY, name TEXT);" > /tmp/test.sql
          wizerd generate /tmp/test.sql -o /tmp/test.svg
          test -f /tmp/test.svg
