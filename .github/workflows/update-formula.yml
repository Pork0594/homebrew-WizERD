name: Update Formula

on:
  schedule:
    - cron: "0 0 * * *" # Daily at midnight UTC
  workflow_dispatch:
  repository_dispatch:
    types: [pypi_updated]

jobs:
  update-formula:
    name: Check and Update Formula
    runs-on: macos-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check for new version
        id: check
        run: |
          CURRENT_VERSION=$(grep -m1 'version "' Formula/wizerd.rb | sed 's/.*version "\(.*\)"/\1/')
          echo "Current formula version: $CURRENT_VERSION"

          LATEST_VERSION=$(curl -fsSL https://pypi.org/pypi/wizerd/json \
            | python3 -c "import sys, json; print(json.load(sys.stdin)['info']['version'])")
          echo "Latest PyPI version: $LATEST_VERSION"

          echo "current_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          echo "latest_version=$LATEST_VERSION" >> $GITHUB_OUTPUT

          if [ "$CURRENT_VERSION" != "$LATEST_VERSION" ]; then
            echo "needs_update=true" >> $GITHUB_OUTPUT
          else
            echo "needs_update=false" >> $GITHUB_OUTPUT
            echo "Formula is already up to date."
          fi

      - name: Download new source distribution
        if: steps.check.outputs.needs_update == 'true'
        id: download
        run: |
          VERSION="${{ steps.check.outputs.latest_version }}"

          # Fetch the exact hashed URL from PyPI (what brew audit --strict requires)
          URL=$(curl -fsSL https://pypi.org/pypi/wizerd/${VERSION}/json \
            | python3 -c "
            import sys, json
            data = json.load(sys.stdin)
            sdist = next(f for f in data['urls'] if f['packagetype'] == 'sdist')
            print(sdist['url'])
            ")

          curl -fsSL "$URL" -o "/tmp/wizerd-${VERSION}.tar.gz"
          SHA256=$(shasum -a 256 "/tmp/wizerd-${VERSION}.tar.gz" | awk '{print $1}')

          echo "sha256=$SHA256" >> $GITHUB_OUTPUT
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "Downloaded $URL (sha256: $SHA256)"

      - name: Update formula version, URL and sha256
        if: steps.check.outputs.needs_update == 'true'
        run: |
          VERSION="${{ steps.check.outputs.latest_version }}"
          URL="${{ steps.download.outputs.url }}"
          SHA256="${{ steps.download.outputs.sha256 }}"

          # Escape URL for sed
          ESCAPED_URL=$(printf '%s\n' "$URL" | sed 's/[\/&]/\\&/g')

          sed -i '' "s|version \"[0-9.]*\"|version \"${VERSION}\"|" Formula/wizerd.rb
          sed -i '' "s|sha256 \"[a-f0-9]*\"|sha256 \"${SHA256}\"|1" Formula/wizerd.rb
          sed -i '' "s|url \"https://files.pythonhosted.org/packages/.*wizerd-[0-9.]*.tar.gz\"|url \"${ESCAPED_URL}\"|" Formula/wizerd.rb

          echo "Updated version/url/sha256 in Formula/wizerd.rb"

      - name: Update resource blocks
        if: steps.check.outputs.needs_update == 'true'
        run: |
          # Install local tap so brew update-python-resources can find the formula
          TAP_DIR="$(brew --prefix)/Library/Taps/pork0594/homebrew-wizerd"
          mkdir -p "$TAP_DIR"
          cp -r "$(pwd)/." "$TAP_DIR/"
          rm -rf "$TAP_DIR/.git"

          # Regenerate all resource blocks in place
          brew update-python-resources pork0594/wizerd/wizerd

          # Copy the updated formula back into the repo
          cp "$TAP_DIR/Formula/wizerd.rb" Formula/wizerd.rb

          echo "Updated resource blocks in Formula/wizerd.rb"
          cat Formula/wizerd.rb

      - name: Create Pull Request
        if: steps.check.outputs.needs_update == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update wizerd to ${{ steps.check.outputs.latest_version }}"
          title: "Update wizerd to ${{ steps.check.outputs.latest_version }}"
          body: |
            Automated update of the wizerd Homebrew formula.

            | | Version |
            |---|---|
            | **Before** | `${{ steps.check.outputs.current_version }}` |
            | **After** | `${{ steps.check.outputs.latest_version }}` |

            **Changes included:**
            - Updated formula version, URL, and sha256
            - Regenerated all Python resource blocks via `brew update-python-resources`

            > Created automatically by the formula update workflow.
          branch: update/wizerd-${{ steps.check.outputs.latest_version }}
          delete-branch: true
          labels: |
            dependencies
            homebrew
